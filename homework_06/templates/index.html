{% extends "base.html" %}

{% block content %}

<h1>📚 My Books</h1>

{% if message %}
<p style="color: green;">{{ message }}</p>
{% endif %}

<form method="POST">
    <input type="text" name="title" placeholder="Book title">
    <input type="text" name="author" placeholder="Author">
    <button type="submit">Add</button>
</form>

<ul>
    {% for book in books %}
        <li>
            <a href="/book/{{ book.id }}">
                {{ book.title }} - {{ book.author }}
            </a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
